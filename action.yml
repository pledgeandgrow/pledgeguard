name: "PledgeGuard Secret Scan"
description: "Scan your repository for secrets and leaked credentials with 708+ detectors and live verification."
branding:
  icon: "shield"
  color: "red"
inputs:
  path:
    description: "Path to scan (file or directory)."
    required: false
    default: "."
  format:
    description: "Output format: table, json, sarif, csv, junit, github-actions, template."
    required: false
    default: "github-actions"
  min-severity:
    description: "Minimum severity to report: low, medium, high, critical."
    required: false
    default: "low"
  fail-on-findings:
    description: "Exit with non-zero code if any findings are detected."
    required: false
    default: "true"
  verify:
    description: "Enable live verification of detected secrets (makes network calls)."
    required: false
    default: "false"
  scan-history:
    description: "Also scan git history for secrets in past commits."
    required: false
    default: "false"
  report-file:
    description: "Write the report to this file (useful for SARIF upload)."
    required: false
    default: ""
  show-all:
    description: "Include findings flagged as likely false positives."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Install PledgeGuard
      shell: bash
      run: |
        if ! command -v pledgeguard &>/dev/null; then
          echo "Installing PledgeGuard..."
          if command -v npx &>/dev/null; then
            npm install -g pledgeguard
          else
            echo "::error::pledgeguard not found and npm not available. Install from https://github.com/pledgeandgrow/pledgeguard/releases"
            exit 1
          fi
        fi

    - name: Run PledgeGuard scan
      shell: bash
      run: |
        set -euo pipefail

        ARGS="scan '${{ inputs.path }}'"
        ARGS="$ARGS --format '${{ inputs.format }}'"
        ARGS="$ARGS --min-severity '${{ inputs.min-severity }}'"

        if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
          ARGS="$ARGS --fail-on-findings"
        fi
        if [ "${{ inputs.verify }}" = "true" ]; then
          ARGS="$ARGS --verify"
        fi
        if [ "${{ inputs.show-all }}" = "true" ]; then
          ARGS="$ARGS --show-all"
        fi

        REPORT_FILE="${{ inputs.report-file }}"

        if [ -n "$REPORT_FILE" ]; then
          ARGS="$ARGS --report-file '$REPORT_FILE'"
        fi

        if [ "${{ inputs.scan-history }}" = "true" ]; then
          echo "Running PledgeGuard git history scan..."
          eval "pledgeguard scan-history ${ARGS}"
        else
          echo "Running PledgeGuard scan..."
          eval "pledgeguard ${ARGS}"
        fi
